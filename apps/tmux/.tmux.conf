#
# tmux.conf : tmuxの設定ファイル
#
# Tips:
# set: alias of set-option
# setw: alias of set-window-option
# bind: alias of bind-key
# -r: repeatable key


#################################################
# 一般的な設定
#################################################
set  -g  default-shell /bin/zsh                     # tmux 起動時のデフォルトシェルの設定を変更
set  -g  buffer-limit 20                            # バッファの数を増やす
set  -g  history-limit 5000                         # ペインの履歴を拡張
set  -s  escape-time 0                              # ESCキーの遅延を無くす
set  -g  xterm-keys on                              # xtermスタイルのファンクションキーシーケンスを生成する
set  -g  focus-events on                            # Tmux フォーカスイベントを有効にする
setw -g  monitor-activity on                        # ウィンドウの活動を監視し、ウィンドウ名をハイライトする
set  -g  visual-activity on                         # 活動があったらステータスラインにメッセージを表示する
set  -g  mouse on                                   # マウスを使えるようにする
set  -g  terminal-overrides 'xterm*:smcup@:rmcup@'  # アプリ終了後も画面内容を履歴に残す
set  -ag terminal-overrides ',*:U8=0'               # UTF-8/罫線まわりの表示崩れ防止
set  -g  allow-passthrough on                       # For wezterm cwd fork: wezterm osc7用に追加
# set  -s  set-clipboard on                           # osc52ベースの端末コピーを有効化(-s: tmux server)

#################################################
# タイトル設定
#################################################
set -g set-titles on                    # タイトルを有効にする
# - #S: セッション名 (Session)
# - #I: ウィンドウ番号 (window Index)
# - #P: ペイン番号 (Pane)
# - #W: ウィンドウ名 (Window name)
set -g set-titles-string '#S:#I.#P #W'  # タイトルのフォーマットを変更
set -g renumber-windows on              # ウィンドウを閉じた時にウィンドウ番号を付番しなおす
# cf. http://blog.yagni.jp/archives/498 (in japanese)
# cf. http://stackoverflow.com/questions/6041178/keep-the-windows-name-fixed-in-tmux
set -g allow-rename off                 # ウィンドウの名前を自動で変更しないようにする
set -g base-index 1                     # ウィンドウの番号を１始まりにする
set -g pane-base-index 1                # ペインの番号を１始まりにする

#################################################
## ステータスラインの設定
#################################################
# Status line で使用できる特殊文字
#   #(shell command) コマンドの出力の最初の行
#   #[attributes]    色や属性の変更
#   #H               ローカルホストのホスト名
#   #h               ローカルホストのドメイン名を除いたホスト名
#   #F               カレントウィンドウのフラグ
#   #I               カレントウィンドウのインデクス
#   #D               カレントペインの識別子
#   #P               カレントペインのインデクス
#   #S               セッション名
#   #T               カレントペインのタイトル
#   #W               カレントウィンドウの名前
#   ##               #
# set -g status on                 # ステータスライン有効
set -g status-position top        # ステータスラインを上に表示する
set -g status-interval 2          # 更新間隔
set -g status-justify "centre"    # ウィンドウリスト配置位置
set -g status-left-length  200    # ステータスラインの長さ
set -g status-right-length 220    # ステータスラインの長さ
set -g status-left  "#[fg=brightgreen]#{?client_prefix,#[reverse],}[#S] #(basename '#{pane_current_path}') #[default]"
set -g status-right "#[fg=brightgreen]#{?client_prefix,#[reverse],}#(whoami)@#H[%Y-%m-%d(%a) %H:%M:%S]"

#################################################
# カラー設定
#################################################
##### colour view in bash command is below...
#####
##### for i in {0..255} ; do
#####     printf "\x1b[38;5;${i}mcolour${i}  "
##### done
# [vimの256色対応させるのにset t_Co=256は必要ない | ysk24ok.github.io](https://ysk24ok.github.io/2017/02/05/vim_256color.html)
set -g  default-terminal "screen-256color"       # 256色ターミナルを有効化する
# [tmux 上で Vim を True Color (24 bit color) で使う #Vim - Qiita](https://qiita.com/yami_beta/items/ef535d3458addd2e8fbb)
set -ga terminal-overrides ",xterm-256color:Tc"
#################################################
#### COLOUR (Solarized dark)
#################################################
set  -g status-style bg=colour234,fg=blue,default           # default statusbar colors
set  -g pane-border-style fg=black                          # pane border
set  -g pane-active-border-style fg=brightgreen             # active pane border
# set  -g pane-border-lines heavy                             # pane border lines
set  -g message-style bg=black,fg=red                       # message text
set  -g display-panes-active-colour blue                    # display pane active border color
set  -g display-panes-colour brightred                      # display pane border color
#setw -g window-status-attr dim
#setw -g window-status-current-attr bright
setw -g window-status-style fg=colour244,bg=default         # default window title colors
setw -g window-status-current-style fg=brightwhite,bg=blue,bold # active window title colors
setw -g window-status-bell-style fg=black,bg=red            # bell window title colors
setw -g clock-mode-colour blue                              # clock color


#################################################
# キーバインドの定義
#################################################
unbind C-b              # デフォルトのプレフィックス(Ctrl-b)無効化
set -g prefix C-a       # プレフィックスキーを Ctrl-a にする
bind C-a send-prefix    # prefix の後にもう一度 C-a を押したら、C-a を「素通し」する
setw -g mode-keys vi    # viライクなキーバインドにする

# 現在のペインのパスを表示
bind   P display-message    "#{pane_current_path}"
# Window検索設定
unbind f
bind   f command-prompt -p "find-window:" "find-window -N '%%'"
# Ctrl+r : 設定ファイルの再読み込み
bind C-r source-file ~/.tmux.conf \; display-message "Reload Config!!"

########################
# セッション操作
########################
bind -n M-N new-session -c "#{pane_current_path}"
bind -n M-j switch-client -n                              # 次のセッションに移動
bind -n M-k switch-client -p                              # 前のセッションに移動
# tmux utils
bind -n M-t choose-tree                                   # セッション、ウィンドウ、ペインをツリー形式で選択
bind -n M-w choose-tree -w                                # ウィンドウをツリー形式で選択
bind -n M-s choose-session                                # セッションを選択
bind -n M-S display-popup -E -d "#{pane_current_path}" -w 90% -h 90% "zsh -ic tmuxs"
bind -n M-f display-popup -E -d "#{pane_current_path}" -w 90% -h 90% "zsh -ic tmux-file-picker"
bind -n M-g display-popup -E -d "#{pane_current_path}" -w 90% -h 90% "zsh -ic tig"
bind -n M-G display-popup -E -d "#{pane_current_path}" -w 90% -h 90% "zsh -ic lazygit"

########################
# ウィンドウ操作
########################
# Prefix+1,2,3,4 or Prefix+n/p
bind c       new-window   -c "#{pane_current_path}"
bind |       split-window -c "#{pane_current_path}" -h
bind '\'     split-window -c "#{pane_current_path}" -hb
bind -       split-window -c "#{pane_current_path}" -v
bind _       split-window -c "#{pane_current_path}" -vb
bind -n M-n  new-window   -c "#{pane_current_path}"       # 新しいウィンドウの作成
bind -n M-\\ split-window -c "#{pane_current_path}" -h    # window 縦分割
bind -n M-\| split-window -c "#{pane_current_path}" -hb   # window 縦分割(左右反転)
bind -n M--  split-window -c "#{pane_current_path}" -v    # window 横分割
bind -n M-_  split-window -c "#{pane_current_path}" -vb   # window 横分割(上下反転)
bind -n M-l  next-window                                  # next ウィンドウの移動
bind -n M-h  previous-window                              # previous ウィンドウの移動
bind -n M-r  command-prompt "rename-window -- '%%'"       # ウィンドウ名の変更
bind -n M-x  kill-window                                  # ウィンドウの削除
bind -n M-=  run-shell "zsh -ic tmux-sort-windows"        # ウィンドウの並び替え (tmux-sort-windows)
########################
# ペイン操作(vi)
########################
unbind l
# ペイン移動(-r: repeatable)
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R
# サイズ変更(-r: repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

#################################################
# Copy Mode
#################################################
unbind ]
bind   ]     copy-mode \; display "Copy mode"
bind   Space copy-mode \; display "Copy mode"

bind   -T copy-mode-vi v    send -X begin-selection     # 選択開始
bind   -T copy-mode-vi C-n  send -X page-up             # 1画面分上にスクロール
bind   -T copy-mode-vi C-f  send -X page-down           # 1画面分下にスクロール
unbind -T copy-mode-vi K
unbind -T copy-mode-vi J
bind   -T copy-mode-vi K    send -X -N 10 cursor-up     # カーソルを10行上に移動
bind   -T copy-mode-vi J    send -X -N 10 cursor-down   # カーソルを10行下に移動
bind   -T copy-mode-vi C-u  send -X -N 20 cursor-up     # カーソルを20行上に移動
bind   -T copy-mode-vi C-d  send -X -N 20 cursor-down   # カーソルを20行下に移動
# Esc キーでコピーの反転を解除（コピーモードは抜けない）
# bind -T copy-mode-vi Escape send -X clear-selection
# # Ctrl-c キーでコピーの反転を解除し、コピーモードから抜ける
# bind -T copy-mode-vi C-c    send -X  cancel
#
# # コピーモード中（Prefix+v 後）C-v で矩形選択開始
# bind -T copy-mode-vi C-v    send -X  rectangle-toggle
# # 1行選択
# bind -T copy-mode-vi V      send -X  select-line
#
# # 単語の最初の1文字に移動
# bind -T copy-mode-vi w      send -X  next-word
# # 単語の最後の1文字に移動
# bind -T copy-mode-vi e      send -X  next-word-end
# # w の逆の動き back
# bind -T copy-mode-vi b      send -X  previous-word
#
# # 画面上に映る最上行に移動
# bind -T copy-mode-vi g      send -X  top-line
# # 画面上に映る最下行に移動
# bind -T copy-mode-vi G      send -X  bottom-line
# 前方検索
# bind -T copy-mode-vi /      send -X  search-forward
# 後方検索
# bind -T copy-mode-vi ?      send -X  search-backward


#################################################
# copy-pipeの設定
#################################################
# Mac OS-X用
if-shell "uname | grep Darwin" \
         "source-file ~/.tmux/tmux.conf.macosx"
# Linux用
if-shell "uname | grep Linux" \
         "source-file ~/.tmux/tmux.conf.linux"
## Cygwin用
#if-shell "uname | grep -q CYGWIN" \
#         "source-file ~/.tmux/tmux.conf.cygwin"
# Msys2用
if-shell "uname | grep -E -q '(MSYS|MINGW)'" \
         "source-file ~/.tmux/tmux.conf.msys"
