# ref: https://golangci-lint.run/usage/configuration/
version: "2"
linters:
  # すべてのlinterを無効化
  # 以下のlinterは無効化できないので、個別でdisableにする
  # errcheck, govet, ineffassign, staticcheck, unused
  default: none
  # 有効なlinterを設定 ref: https://golangci-lint.run/usage/linters/
  enable:
    - gosec
    - govet
    - staticcheck
  # 無効なlinterを設定
  disable: []
  # 個別のlinter設定
  settings:
    # staticcheck のチェックを全有効化(SA/ST/S/QF)。
    # エディタの素の staticcheck と検知範囲を揃えるため。
    # ST1000(パッケージコメント), QF1008(埋め込みフィールドの冗長selector)は
    # エディタ側でも無効化しているため除外する。
    staticcheck:
      checks:
        - all
        - -ST1000
        - -QF1008
  # 特定の除外設定
  exclusions:
    # 自動生成ファイルを除外
    generated: lax
    # 事前定義された除外設定
    presets: []
    # パス・ルール・テキスト単位での除外設定
    rules:
      # テストファイルのダミー認証情報(sk_test_xxx 等)は gosec の誤検知のため除外
      - path: _test\.go
        linters:
          - gosec
    # パス・ファイルごとの除外設定
    paths: []
formatters:
  # フォーマッタは、Go標準を利用するので無効化
  enable: []
# ref: https://golangci-lint.run/usage/configuration/#issues-configuration
issues:
  max-issues-per-linter: 50
  max-same-issues: 3
  uniq-by-line: true
  # true: HEADとの差分や新しいファイル等のみを検出対象とする
  # false: すべてのコードを検出対象とする
  new: true
  # 修正可能なlinterの問題を自動修正する
  fix: true
# ref: https://golangci-lint.run/usage/configuration/#run-configuration
run:
  timeout: 10m
  relative-path-mode: gomod
  issues-exit-code: 1
  tests: true
  allow-parallel-runners: true
  allow-serial-runners: true
  concurrency: 0
